<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strategist · Dungeon — variações</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="dungeon.css" />
<style>
  html, body { margin: 0; background: #14100a; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="var-terminal.jsx"></script>
<script type="text/babel" src="var-grimoire.jsx"></script>
<script type="text/babel" src="var-cartograph.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const dark = { background: "#14100a", borderRadius: 4 };

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="dungeon" title="Strategist · Dungeon RPG" subtitle="3 direções · terminal/grimório âmbar — escolha uma para finalizar">
          <DCArtboard id="a" label="A · Terminal Crawl" width={1120} height={2360} style={dark}>
            <VarTerminal />
          </DCArtboard>
          <DCArtboard id="b" label="B · Arcane Grimoire" width={1120} height={2664} style={dark}>
            <VarGrimoire />
          </DCArtboard>
          <DCArtboard id="c" label="C · Dungeon Cartograph" width={1120} height={1284} style={dark}>
            <VarCartograph />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
