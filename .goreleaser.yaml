version: 2

project_name: strategist

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/strategist
    binary: strategist
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - format: binary
    name_template: "strategist-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

release:
  github:
    owner: SergioLacerda
    name: strategist-skill
  draft: false

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
