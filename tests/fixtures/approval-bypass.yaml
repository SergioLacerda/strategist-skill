scenario: approval_bypass
description: >
  Sniper is invoked without the user responding to the approval gate.
  Strategist must detect the drift pattern and emit a blocked event.

input:
  active_yaml:
    mode: pragmatic
    base_path: .analysis
    roles_config: default
  roles_default_yaml:
    discovery: brainstorming
    refinement: openspec-explore
    execution: sdd-ask
  state: refinement_complete_approval_gate_not_shown

trigger: invoke_execution_slot_directly

expected_event: "phase=execution status=blocked reason=approval_bypass"
