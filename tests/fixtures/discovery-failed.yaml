scenario: discovery_failed
description: >
  The Ranger slot returns status=failed. Strategist must stop and not proceed
  to refinement. A blocked event must be emitted.

input:
  active_yaml:
    mode: pragmatic
    base_path: .analysis
    roles_config: default
  roles_default_yaml:
    discovery: brainstorming
    refinement: openspec-explore
    execution: sdd-ask
  slot_output:
    status: failed
    failure_type: permanent

trigger: ranger_returns_failed

expected_event: "phase=analysis status=blocked reason=ranger_failed"
