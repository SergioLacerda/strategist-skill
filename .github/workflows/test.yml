name: Test

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run ./...

      - name: Test (with race detector)
        run: go test -race ./...

      - name: Coverage gate (>90% per package)
        run: |
          fail=0
          # internal/domain excluded: pure type declarations, no executable statements.
          for pkg in internal/stale internal/compile internal/install internal/embed cmd/strategist; do
            pct=$(go test -coverprofile=/tmp/cov.out -coverpkg=./$pkg/... ./$pkg/... 2>/dev/null \
                  | grep -o '[0-9.]*%' | tail -1 | tr -d '%')
            echo "$pkg: ${pct}%"
            awk -v pct="$pct" 'BEGIN { if (pct+0 < 90) { print "FAIL: " pct "% < 90%"; exit 1 } }'
          done

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Module hygiene
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
          go mod verify

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build
        run: go build ./...
