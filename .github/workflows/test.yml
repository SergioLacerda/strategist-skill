name: Test

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Module hygiene
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
          go mod verify

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          golangci-lint run ./...

      - name: Build
        run: go build ./...

      - name: Test (with race detector)
        run: go test -race $(go list ./... | grep -v '/testutil')

      - name: Integration tests
        run: go test -tags=integration -race ./tests/...

      - name: Coverage gate (>90% per package)
        run: |
          fail=0
          # internal/domain excluded: pure type declarations, no executable statements.
          for pkg in internal/stale internal/compile internal/install internal/embed cmd/strategist; do
            pct=$(go test -coverprofile=/tmp/cov.out -coverpkg=./$pkg/... ./$pkg/... 2>/dev/null \
                  | grep -o '[0-9.]*%' | tail -1 | tr -d '%')
            echo "$pkg: ${pct}%"
            ok=$(awk -v p="$pct" 'BEGIN{print (p+0 >= 90)}')
            if [ "$ok" != "1" ]; then
              echo "  FAIL: ${pct}% < 90%"
              fail=1
            fi
          done
          exit $fail

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Fixture and schema validation
        run: |
          pip install pyyaml --quiet
          bash strategist/tests/run-tests.sh
