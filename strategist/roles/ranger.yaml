role: ranger
slot: discovery

# Canonical behaviors — read-only, source in skill.yaml.
# Listed here for reference when writing custom_brief below.
canonical:
  - find_unexpected_items       # surface items outside declared mission scope
  - consult_treasure_chests     # consult chests scoped to discovery before generating artifact
  - output_format: "<base_path>/pending/<mission_id>-discovery.md"

# Additional instructions for the Ranger in this installation.
# Strategist appends this block to the role brief at invocation, after canonical behaviors.
# If empty or absent, only canonical behaviors are used.
#
# Examples:
#   custom_brief: |
#     Search the codebase for patterns similar to the mission scope.
#     Check open related issues before closing the discovery artifact.
custom_brief: ""
