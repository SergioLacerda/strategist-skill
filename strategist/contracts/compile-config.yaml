module: compile-config
type: shell_script
description: >
  Compiles active.yaml, ALL personas/*.yaml, and ALL roles/*.yaml into a single
  gzipped JSON blob. Compiles all personas (not just the active one) so the agent
  can select by key at runtime.

contract:
  input:
    - name: strategist_root
      type: path ($1)
      required: true
      description: Path to the .strategist/ directory
    - name: output_path
      type: path ($2)
      required: true
      description: Destination path for .compiled/.config.gz

  output:
    - name: config_gz
      type: file
      schema: strategist-compiled-config/1.0
      description: >
        Gzipped JSON with fields: schema, compiled_at, sources, active (parsed active.yaml),
        personas (name → parsed YAML), roles (name → parsed YAML)

  error_conditions:
    - code: active_yaml_not_found
      trigger: $1/active.yaml does not exist
      behavior: Print error to stderr, exit 1
    - code: no_personas_found
      trigger: personas/ directory empty or absent
      behavior: PERSONAS_JSON remains {}, compile proceeds (agent falls back to standard path at runtime)
    - code: dependency_missing
      trigger: yq, jq, or gzip not in PATH
      behavior: Command fails with shell error, exit non-zero

  write_scope: $2 path only (creates parent directory if absent)

  owner: install-time

  idempotent: true
  requires: [yq, jq, gzip, stat]

  known_limitation: >
    Adding a new persona or role file after compile is not detected by check-stale.sh
    (new file not in sources block). Requires re-run of compile-all.sh.
