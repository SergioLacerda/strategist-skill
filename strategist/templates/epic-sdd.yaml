# active.yaml — epic SDD integration template
# Generated from: templates/epic-sdd.yaml
# Mode: SDD integration (requires sdd-analysis-plugin-protocol deployed in target repo)

mode: epic

base_path: .sdd/analysis

knowledge_index_path: knowledge.index.yaml

# Language for all generated artifacts (discovery docs, ADRs, analysis files).
# Values: pt | en
language: pt

# Set to false to disable the ADR opportunity stage entirely.
adr_enabled: true

# Slot providers — which skill fills each mission role.
# The execution slot is overridden at runtime by sdd_injection.execution_provider
# when the SDD plugin is active. The value here is the fallback.
slots:
  discovery: brainstorming      # Ranger  — write_pending contract
  refinement: openspec-explore  # Arquivista — write_analysis contract
  execution: sdd-ask            # Sniper  — overridden by sdd_injection at runtime

sdd_injection:
  # These fields are populated at runtime by SDD when plugin is registered.
  # Values here serve as documentation of the expected shape.
  execution_provider: sdd-ask          # overrides slots.execution
  base_path: .sdd/analysis             # overrides base_path above
  knowledge_paths:
    - .sdd/docs                        # appended to knowledge.index.yaml sources
  governance_context: .sdd/agent-instructions.md
