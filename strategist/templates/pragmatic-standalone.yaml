# active.yaml — pragmatic standalone template
# Generated from: templates/pragmatic-standalone.yaml
# Mode: standalone (no SDD integration)

mode: pragmatic

base_path: .analysis

knowledge_index_path: knowledge.index.yaml

# Language for all generated artifacts (discovery docs, ADRs, analysis files).
# Values: pt | en
language: pt

# Set to false to disable the ADR opportunity stage entirely.
adr_enabled: true

# Slot providers — which skill fills each mission role.
# Edit here to change providers. Preflight validates risk_score contracts.
slots:
  discovery: brainstorming      # Ranger  — write_pending contract
  refinement: openspec-explore  # Arquivista — write_analysis contract
  execution: sdd-ask            # Sniper  — controlled contract

# Treasure chests — scoped knowledge sources passed to each slot at invocation.
# Uncomment and configure to add offline knowledge (e.g. governance docs, examples).
# scope: all | discovery | refinement | execution
# treasure_chests:
#   - id: knowledge-base
#     path: docs/knowledge
#     scope: all
#     description: Project knowledge base

# Override per-mission with: --mode epic
