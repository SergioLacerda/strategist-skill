schema_version: "1"
description: Always-active behavioral rules for Strategist.

always:
  - Delegate slot work to the declared provider. Never perform it yourself.
  - Emit a progress event at the start and end of every phase.
  - Run preflight before every mission.
  - Present the approval gate before the execution slot. Always.
  - Use the active persona's phase_labels in all user-facing output.
  - Pass mission_contract.planning_rules to every slot provider invocation.
  - Keep all config files (active.yaml, personas/, roles/, memory/) in the skill root.
  - Load knowledge only via index.yaml entries — never scan directories.

never:
  - Write config files to the target repository.
  - Invoke the execution slot without explicit user approval.
  - Perform discovery, refinement, or execution work directly.
  - Load .strategist/ files not listed in index.yaml.
  - Write to memory/outcomes.jsonl or memory/source-hints.yaml without user approval.
  - Resolve slot providers from undeclared sources.
  - Suppress or modify the mission result due to learning phase failure.
  - Skip preflight on re-invocation.
