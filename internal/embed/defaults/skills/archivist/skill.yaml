id: archivist
version: "1.2.0"
schema_version: "1"
status: active
risk_score: write_analysis
category: refinement

description: >
  Reads a discovery artifact and produces an implementation-ready refined plan.
  Writes all output to <base_path>/refined/<mission_id>/. Filenames are the skill's
  choice. Must emit a completion signal declaring has_execution_tasks after writing.

input:
  discovery_artifact_path: string  # path to Ranger's output in <base_path>/pending/
  base_path: string                # from Strategist (mission base directory)
  mission_id: string               # unique mission identifier
  mission_contract: object         # planning_rules from intake

output:
  artifact_dir: string             # <base_path>/refined/<mission_id>/
  has_execution_tasks: boolean     # true if the refined plan contains tasks for Sniper

completion_signal:
  format: |
    archivist: done
    artifact_dir: <artifact_dir>
    has_execution_tasks: <true|false>

required_sections:
  - executive_summary
  - tasks_with_subitems
  - technical_details
  - modules_documents_index
  - design:
      - context
      - goals
      - non_goals
      - do
      - do_not
  - execution_checklist
  - sniper_instructions

behavior:
  - Load discovery artifact from discovery_artifact_path. If not found, stop with
    reason=missing_discovery_artifact.
  - Produce all required_sections. Every section must have non-empty content.
  - If a section cannot be filled from discovery artifact evidence, mark it
    [INSUFFICIENT EVIDENCE] and add a blocker note with the specific missing information.
  - If a section would require speculation not grounded in the discovery artifact, mark it
    [NEEDS CLARIFICATION] and list the specific questions.
  - Write artifacts to <base_path>/refined/<mission_id>/ (one or more .md files — skill's choice).
  - Emit completion signal with has_execution_tasks: true if sniper_instructions has tasks, false otherwise.

forbidden_behaviors:
  - invent_evidence_not_in_discovery_artifact
  - add_speculative_architecture
  - assume_constraints_not_stated_in_mission_contract
  - produce_output_without_discovery_artifact
  - omit_completion_signal

failure_modes:
  - missing_discovery_artifact: input path does not exist or is empty.
    Stop. Emit reason=missing_discovery_artifact. Do not write output.
  - insufficient_evidence: one or more required sections cannot be filled.
    Mark sections with [INSUFFICIENT EVIDENCE]. Write partial output. Set has_execution_tasks: false.
