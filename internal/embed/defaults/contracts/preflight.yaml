module: preflight
type: agent_phase
description: >
  Loads internal domain (identity, directives) and validates slot providers.
  Runs after Bootstrap. Must emit status=done before Intake begins.

contract:
  input:
    - name: active
      type: object
      required: true
      description: Active config from Bootstrap (mode, base_path, roles_config)
    - name: persona
      type: object
      required: true
      description: Resolved persona from Bootstrap
    - name: roles
      type: object
      required: true
      description: Slot providers map from Bootstrap

  output:
    - name: domain
      type: object
      description: Loaded internal domain (core_invariants, drift_patterns, directives)
    - name: slot_providers
      type: object
      description: Resolved slot provider skill.yaml paths for discovery, refinement, execution
    - name: preflight_status
      type: string
      description: "done" on success

  error_conditions:
    - code: index_yaml_not_found
      trigger: <base_path>/.strategist/index.yaml absent
      behavior: Continue without internal domain (non-blocking)
    - code: slot_provider_not_found
      trigger: Provider skill.yaml cannot be resolved from any search path
      behavior: Emit blocked event with reason=slot_provider_not_found, stop mission
    - code: slot_risk_mismatch
      trigger: Provider risk_score does not match required contract for slot
      behavior: Emit blocked event with reason=slot_risk_mismatch slot=<label>, stop mission
    - code: compiled_artifact_corrupt
      trigger: .compiled/.domain.gz fails jq parse
      behavior: Fall back to standard path (load YAML directly), emit preflight=standard_path

  write_scope: read-only

  owner: internal (orchestrator)

  fast_path:
    artifact: .strategist/.compiled/.domain.gz
    check: sh .strategist/scripts/check-stale.sh .strategist/.compiled/.domain.gz
    log_fresh: "[Strategist] preflight=fast_path"
    log_stale: "[Strategist] preflight=standard_path"

  validation_rule: >
    If .strategist/contracts/ exists, load this contract file before executing preflight.
    Validate that all declared inputs are present before proceeding.
