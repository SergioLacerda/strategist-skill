schema_version: "1"
task_type: architecture_analysis
score_threshold: 0.75

must_have:
  - executive_summary
  - modules_index
  - inter_module_boundaries
  - dependency_direction
  - risk_assessment
  - technical_details_grounded_in_discovery
  - execution_checklist

must_not:
  - speculative_architecture_claims
  - modules_not_in_discovery_artifact
  - missing_boundary_definitions
  - unsupported_risk_ratings

scoring:
  executive_summary: 0.10
  modules_index: 0.20
  inter_module_boundaries: 0.20
  dependency_direction: 0.10
  risk_assessment: 0.15
  technical_details_grounded_in_discovery: 0.15
  execution_checklist: 0.10
