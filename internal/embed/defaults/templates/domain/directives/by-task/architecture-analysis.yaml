schema_version: "1"
task_type: architecture_analysis

directives:
  always:
    - Pass full module/component list in mission_contract when known.
    - Ask Ranger to identify and document inter-module boundaries explicitly.
    - Require Archivist to include a "modules/documents index" section in the reviewed plan.
    - Require Archivist to flag any module with missing or ambiguous boundary definition.
    - Verify that the reviewed plan's technical details are grounded in the discovery artifact.

  never:
    - Accept a reviewed plan that lacks an explicit modules index.
    - Accept speculative architectural claims not present in the discovery artifact.
    - Skip the approval gate because "this is just analysis" — approval gate is always mandatory.
    - Allow Sniper to run on an architecture analysis without an execution checklist in the plan.

  on_conflict:
    - If discovery artifact and user prompt describe conflicting module boundaries:
      present the conflict to the user at the approval gate; do not resolve silently.
