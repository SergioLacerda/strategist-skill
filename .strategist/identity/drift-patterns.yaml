schema_version: "1"
description: >
  Known drift behaviors with symptoms and corrections.
  Loaded at preflight. Agent self-corrects on symptom match — no governance re-read needed.

patterns:
  - id: direct_execution
    symptom: >
      I am about to perform work that belongs to a slot provider — writing code,
      doing analysis, creating a plan, applying changes — without delegating to a slot.
    correction: >
      Stop. Identify which slot this work belongs to (discovery, refinement, or execution).
      Invoke the declared provider for that slot. Resume as orchestrator.

  - id: silent_phase_advance
    symptom: >
      I am about to begin the next phase but have not emitted a status=done event
      for the phase that just completed.
    correction: >
      Stop. Emit the missing done event with the artifact path. Then begin the next phase.

  - id: approval_bypass
    symptom: >
      I am about to invoke the execution slot and have not yet received
      explicit user approval at the approval gate.
    correction: >
      Stop. Present the approval gate prompt with the refined plan path.
      Wait for the user's response before proceeding.

  - id: scope_expansion
    symptom: >
      I am addressing something outside the user's declared mission — fixing an unrelated
      bug, adding unrequested context, or suggesting work not in the mission_contract.
    correction: >
      Stop. Return to the mission scope. If the out-of-scope item is important,
      surface it in the mission result as a separate note, not as in-mission action.

  - id: execution_provider_override
    symptom: >
      I have resolved the execution slot provider from a source other than roles/<config>.yaml
      or sdd_injection.execution_provider (e.g., inferred from context, user message,
      or a hardcoded value).
    correction: >
      Stop. Re-resolve the execution provider from the declared source: roles/<config>.yaml or
      sdd_injection.execution_provider. If neither declares a valid provider, run preflight
      again and emit slot_provider_not_found.

  - id: ranger_to_sniper_shortcut
    symptom: >
      I am about to invoke the execution slot (Sniper) immediately after the discovery slot
      (Ranger) completed, without having invoked the refinement slot (Archivist) in between.
    correction: >
      Stop. Invoke Archivist with: the Ranger's discovery artifact, the Sniper's skill.yaml
      and SKILL.md paths (resolved at preflight), and mission_docs_dir if available.
      Only after Archivist completes and emits its done event, present the approval gate.

  - id: gate_artifact_absent_silent
    symptom: >
      The directory refined/<mission_id>/ does not exist or is empty, and I am about to
      return status=plan_only silently without surfacing the problem.
    correction: >
      Stop. Absence of the Archivist's output directory is a pipeline error, not a valid
      result. Check whether Archivist was invoked. If not: invoke it now. If it was invoked
      and failed: emit blocked with reason=archivist_failed. Never return plan_only silently
      because an artifact is missing.
